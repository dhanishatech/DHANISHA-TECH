<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login / Sign Up – Dhanisha Tech</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login or create an account to access Dhanisha Tech client/freelancer/admin dashboard." />
</head>
<body>

  <!-- ✅ Navbar -->
  <nav class="navbar">
    <div class="logo">🌀 Dhanisha Tech</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html" class="active login-btn">🔐 Login</a></li>
    </ul>
  </nav>

  <!-- ✅ Page Banner -->
  <div class="page-banner">
    <h1>Welcome</h1>
    <p>Please login or create an account</p>
  </div>

  <!-- ✅ Login / Signup Form -->
  <section class="login-section">
    <form class="login-form" id="authForm" novalidate>
      <label for="authType">Action:</label>
      <select id="authType">
        <option value="login" selected>Login</option>
        <option value="signup">Sign Up</option>
      </select>

      <label for="role">Select Role (Signup only):</label>
      <select id="role">
        <option value="">-- Choose --</option>
        <option value="Client">👨‍💼 Client</option>
        <option value="Freelancer">👨‍💻 Freelancer</option>
        <option value="Admin">🧑‍💼 Admin</option>
      </select>

      <label for="name">Name (Signup only):</label>
      <input type="text" id="name" placeholder="Your Name" autocomplete="name" />

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Email" autocomplete="email" required />

      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />

      <p id="msg" class="form-msg" aria-live="polite"></p>

      <button type="submit">Continue</button>
    </form>
  </section>

  <!-- ✅ Footer -->
  <footer>
    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </div>
    <p>&copy; 2025 Dhanisha Tech. All rights reserved.</p>
  </footer>

  <!-- 🔗 Scripts (order matters) -->
  <!-- Firebase bootstrap (placeholders अभी ठीक हैं) -->
  <script type="module" src="js/firebase.js"></script>
  <!-- LocalStorage mock auth + guarded form handler -->
  <script src="js/auth-check.js"></script>
</body>
</html>
